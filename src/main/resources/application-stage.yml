spring:
  datasource:
    url: jdbc:h2:mem:algoryqr-stage;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8055

jwt:
  secret: ${JWT_SECRET:algoryqr-service-jwt-secret-key-min-32-chars-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

app:
  seed:
    admin:
      email: admin@algorycode.com
      password: Admin123!
      phone: "+905550000001"
      first-name: Admin
      last-name: User
