spring:
  application:
    name: algoryqr-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/algoryqrdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      keepalive-time: 30000
      connection-timeout: 8000
      idle-timeout: 300000
      max-lifetime: 600000
      minimum-idle: 2
      maximum-pool-size: 10
      validation-timeout: 3000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2
          max-interval: 10000
          max-attempts: 3
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:977637390906-8uhh6hohv1o71gasg27tq5i4rpad54ef.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            authorization-grant-type: authorization_code
            redirect-uri: ${GOOGLE_CALLBACK_URL:{baseUrl}/google-auth/callback}
            scope:
              - openid
              - profile
              - email

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  info:
    env:
      enabled: true


server:
  port: ${SERVER_PORT:8055}
  forward-headers-strategy: framework

app:
  url: ${APP_URL:http://localhost:3000}
  service-name: ${APP_SERVICE_NAME:qr-service}

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
    pending-timeout-minutes: ${PAYMENT_PENDING_TIMEOUT_MINUTES:30}
  rabbitmq:
    exchange: ${PAYMENT_EVENTS_EXCHANGE:payment.events}
    service-name: ${APP_SERVICE_NAME:qr-service}
    success-queue: ${PAYMENT_SUCCESS_QUEUE:qr-service.payment.success}
    failed-queue: ${PAYMENT_FAILED_QUEUE:qr-service.payment.failed}
    success-routing-key: ${PAYMENT_SUCCESS_ROUTING_KEY:qr-service.payment.success}
    failed-routing-key: ${PAYMENT_FAILED_ROUTING_KEY:qr-service.payment.failed}

jwt:
  secret: ${JWT_SECRET:algoryqr-service-jwt-secret-key-min-32-chars-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

google:
  oauth:
    frontend-callback-url: ${GOOGLE_FRONTEND_CALLBACK_URL:http://localhost:3000/api/auth/google/callback}
    handoff-ticket-ttl: ${GOOGLE_HANDOFF_TICKET_TTL:PT2M}