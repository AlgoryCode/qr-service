spring:
  application:
    name: algoryqr-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/algoryqrdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:femmiens123.}
    driver-class-name: org.postgresql.Driver
    hikari:
      keepalive-time: 30000
      connection-timeout: 8000
      idle-timeout: 300000
      max-lifetime: 600000
      minimum-idle: 2
      maximum-pool-size: 10
      validation-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  info:
    env:
      enabled: true


server:
  port: ${SERVER_PORT:8055}

app:
  url: ${APP_URL:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:algoryqr-service-jwt-secret-key-min-32-chars-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}